# One-command stack: `docker compose up --build`.
#
# Flow:
#   1. `init` runs once: downloads Flickr8k, fills the files DB + images volume,
#      then exits 0 (idempotent: a marker file skips a completed load).
#   2. `files` starts only after `init` completes successfully.
#   3. `users`, `tags`, `clip`, and the `gateway` come up; the gateway is the
#      single public API entry point on http://localhost:8080. `clip` builds a
#      semantic-search index from the images on its first boot (cached after).
#   4. `frontend` (React, served by nginx) comes up on http://localhost:5173.
#
# Data lives in local bind-mounted folders under ./data so it is easy to inspect
# directly from the IDE/Finder and survives restarts (the init step is not
# repeated). Delete ./data to force a completely fresh ingest.

# Shared HMAC secret used to sign/verify auth tokens. The users service mints
# tokens with it and the gateway verifies them, so it MUST be identical in both.
# (Demo value — override via an env file / secret in a real deployment.)
x-auth-secret: &auth_secret "change-me-in-production-please"

services:
  init:
    build:
      context: ./backend
      dockerfile: init_loader/Dockerfile
    environment:
      DATA_DIR: /data
      FILES_DB_PATH: /data/files.db
      IMAGES_DIR: /images
      DEFAULT_DATASET: Flickr8k
      # Set INGEST_MAX_PER_SPLIT to a small number for a quick partial load.
      # INGEST_MAX_PER_SPLIT: 50
    volumes:
      - ./data/files:/data
      - ./data/images:/images
    restart: "no"

  users:
    build:
      context: ./backend
      dockerfile: user_manager/Dockerfile
    environment:
      DATA_DIR: /data
      AUTH_SECRET: *auth_secret
      AUTH_TOKEN_TTL_SECONDS: "86400"
    volumes:
      - ./data/users:/data
    expose:
      - "8000"
    restart: unless-stopped

  files:
    build:
      context: ./backend
      dockerfile: files_manager/Dockerfile
    environment:
      DATA_DIR: /data
      FILES_DB_PATH: /data/files.db
      IMAGES_DIR: /images
      DEFAULT_DATASET: Flickr8k
    volumes:
      - ./data/files:/data
      - ./data/images:/images:ro
    expose:
      - "8000"
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  tags:
    build:
      context: ./backend
      dockerfile: tags_manager/Dockerfile
    environment:
      DATA_DIR: /data
      USERS_SERVICE_URL: http://users:8000
      FILES_SERVICE_URL: http://files:8000
      CLIP_SERVICE_URL: http://clip:8000
      # Public gateway URL used to build absolute image URLs in exports.
      PUBLIC_BASE_URL: http://localhost:8080
    volumes:
      - ./data/tags:/data
    expose:
      - "8000"
    depends_on:
      - users
      - files
      - clip
    restart: unless-stopped

  # CLIP semantic ("meaning") search. On first boot it embeds every image once
  # (a few minutes on CPU) and caches the vectors to ./data/clip; later boots
  # load instantly. Model weights are baked into the image, so it needs no
  # network at runtime. The tags service calls it to rank images by a query.
  clip:
    build:
      context: ./backend
      dockerfile: clip_search/Dockerfile
    environment:
      DATA_DIR: /data
      IMAGES_DIR: /images
    volumes:
      - ./data/clip:/data
      - ./data/images:/images:ro
    expose:
      - "8000"
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  gateway:
    build:
      context: ./backend
      dockerfile: api_gateway/Dockerfile
    environment:
      IMAGES_DIR: /images
      USERS_SERVICE_URL: http://users:8000
      FILES_SERVICE_URL: http://files:8000
      TAGS_SERVICE_URL: http://tags:8000
      CLIP_SERVICE_URL: http://clip:8000
      CORS_ORIGINS: "*"
      AUTH_SECRET: *auth_secret
    ports:
      - "8080:8080"
    volumes:
      - ./data/images:/images:ro
    depends_on:
      - users
      - files
      - tags
      - clip
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-facing gateway URL (host port), baked into the static bundle.
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - gateway
    restart: unless-stopped
